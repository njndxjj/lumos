[supervisord]
nodaemon=true
logfile=/var/log/supervisor/supervisord.log
pidfile=/var/run/supervisord.pid

[program:cron]
command=cron -f
autorestart=true
stderr_logfile=/var/log/supervisor/cron-stderr.log
stdout_logfile=/var/log/supervisor/cron-stdout.log

[program:flask]
command=python monitor_app.py
autorestart=true
stderr_logfile=/var/log/supervisor/flask-stderr.log
stdout_logfile=/var/log/supervisor/flask-stdout.log
environment=DASHSCOPE_API_KEY=%(ENV_DASHSCOPE_API_KEY)s,FEISHU_WEBHOOK=%(ENV_FEISHU_WEBHOOK)s
